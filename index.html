<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zsozso Wallet - </title>
    
    <!-- PWA Manifest and Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#17a2b8">
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zsozso">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- GUN: decentralised real-time graph database -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="gun_bridge.js"></script>
    <script src="sea_bridge.js"></script>

    <!-- Passkey (WebAuthn + Web Crypto) bridge -->
    <script src="passkey_bridge.js"></script>

    <!-- QR code scanner — wascan (loaded as ES module in bridge) -->
    <script src="qr_scanner_bridge.js"></script>

    <!-- In-app log ring buffer (must load before any console.log calls) -->
    <script src="log_bridge.js"></script>
</head>
<body>
    <div id="main"></div>
    <div id="pst"><p>Zsozso loading...</p><p>If it needs more as 1 minute, check the connection,
 of course, and if the issue not solved, it needs to restart the App (Drop it from running
 applications and start it again).</p><p>Refreshing the App not succeeds just now. Please, report
 the issue with logs to the dev!).</p></div>
    
    <!-- Service Worker Registration with auto-reload on update -->
    <script>
        if ('serviceWorker' in navigator) {
            var _swRefreshing = false;

            // 1. Listen for update signal from the SW
            navigator.serviceWorker.addEventListener('message', function(event) {
                if (event.data?.type === '__ZSOZSO_SW_UPDATED') {
                    window.__ZSOZSO_UPDATE_READY = true;
                    window.dispatchEvent(new CustomEvent('zsozso_update_available'));
                }
            });

            // 2. Reload ONCE when a genuinely new SW takes control.
            //    Guard with _swRefreshing to prevent infinite loops.
            //    Only act if there was already a controller (= this is an update,
            //    not the very first SW registration on a fresh browser).
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                if (_swRefreshing) return;
                _swRefreshing = true;
                console.log('[App] New SW took control — reloading once');
                window.location.reload();
            });

            // 3. Register (not re-register) the SW.
            //    updateViaCache:'none' ensures the browser always fetches sw.js
            //    from the network, bypassing any HTTP cache or file lock.
            navigator.serviceWorker.register('/app/sw.js', {
                scope: '/app/',
                updateViaCache: 'none'
            }).then(function(reg) {
                console.log('[App] SW registered, scope:', reg.scope);
                // Kick off an update check every time the page loads
                reg.update();
            });
        }
    </script>
</body>
</html>
