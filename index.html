<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zsozso Wallet - </title>
    
    <!-- PWA Manifest and Theme -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#17a2b8">
    
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Zsozso">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- GUN: decentralised real-time graph database -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <script src="gun_bridge.js"></script>
    <script src="sea_bridge.js"></script>

    <!-- Passkey (WebAuthn + Web Crypto) bridge -->
    <script src="passkey_bridge.js"></script>

    <!-- QR code scanner — wascan (loaded as ES module in bridge) -->
    <script src="qr_scanner_bridge.js"></script>

    <!-- In-app log ring buffer (must load before any console.log calls) -->
    <script src="log_bridge.js"></script>
</head>
<body>
    <div id="main"></div>
    
    <!-- Service Worker Registration with auto-reload on update -->
    <script>
        if ('serviceWorker' in navigator) {
            // 1. Listen for update signal from the SW
            navigator.serviceWorker.addEventListener('message', function(event) {
                if (event.data?.type === '__ZSOZSO_SW_UPDATED') {
                    // Signal to the Rust app that an update is ready
                    window.__ZSOZSO_UPDATE_READY = true;
                    // Also dispatch a custom event for real-time reactivity
                    window.dispatchEvent(new CustomEvent('zsozso_update_available'));
                }
            });

            // 2. Deregister any existing SW first, wait for OS/browser to
            //    release the file lock, then register the fresh SW.
            navigator.serviceWorker.getRegistrations().then(function(regs) {
                var chain = Promise.resolve();
                regs.forEach(function(reg) {
                    console.log('[App] Unregistering old SW, scope:', reg.scope);
                    chain = chain.then(function() { return reg.unregister(); });
                });
                return chain;
            }).then(function() {
                // Give the browser/OS 1 second to fully release the sw.js file
                return new Promise(function(resolve) { setTimeout(resolve, 1000); });
            }).then(function() {
                return navigator.serviceWorker.register('/app/sw.js', {
                    scope: '/app/',
                    updateViaCache: 'none'   // never use HTTP cache for sw.js
                });
            }).then(function(reg) {
                console.log('[App] SW registered (fresh)');
                reg.update();
            });

            // 3. Reload when the new SW takes control (most reliable update signal)
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                console.log('[App] New SW took control — reloading');
                window.location.reload();
            });
        }
    </script>
</body>
</html>
