server {
    server_name zsozso.info;

    location / {
        root /var/www/html;
        index index.html index.htm;

        # Service Worker — MUST NOT be cached by the browser.
        location = /sw.js {
            root /var/www/html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
        }

        # HTML, JSON, manifest — always revalidate
        location ~* \.(html?|json|webmanifest)$ {
            root /var/www/html;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/zsozso.info/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/zsozso.info/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    listen [::]:443 ssl;

    location = /.well-known/stellar.toml {
        root /var/www/html;
        # Required for SEP-1 compliance
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        
        add_header 'Cache-Control' 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';

        # Ensure correct content type for Stellar crawlers
        default_type "text/plain; charset=utf-8";
        
        # Allow access even if other parts of the site are restricted
        allow all;
    }

    # /app → /app/ redirect (trailing slash nélkül nem jó az útvonalfeloldás)
    location = /app {
        return 301 /app/;
    }

    # PWA alkalmazás konfigurációja
    # root-ot használunk alias helyett, mert:
    #   - az alias + try_files kombó ismert nginx bug
    #   - a beágyazott location blokkok nem öröklik az alias-t
    #   - a fájlrendszerbeli útvonal (/var/www/html/app/) úgyis megfelel az URL-nek (/app/)
    location /app/ {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /app/index.html;

        # Service Worker — MUST NOT be cached by the browser.
        # The browser byte-compares sw.js to detect updates;
        # if this is served from HTTP cache, updates are invisible.
        location = /app/sw.js {
            root /var/www/html;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
        }

        # HTML, JSON, manifest, bridge JS — always revalidate
        location ~* \.(html?|json|manifest)$ {
            root /var/www/html;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        # Bridge JS files — should not be aggressively cached
        location ~* _bridge\.js$ {
            root /var/www/html;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate" always;
        }

        # WASM — helyes MIME type (régebbi nginx-ből hiányozhat)
        location ~* \.wasm$ {
            root /var/www/html;
            types { application/wasm wasm; }
            default_type application/wasm;
        }

        # Log upload endpoint — accepts POST with plain-text body (max 1 MB).
        # Files are written to /var/www/html/app/uploads/ by a tiny backend
        # (or handled via nginx upload module). Here we proxy to a local
        # helper listening on port 9977. The directory is capped at 50 MB
        # on the filesystem level (see setup notes).
        location = /app/upload_log {
            # Reject anything other than POST
            limit_except POST { deny all; }

            # Max body size — protects against abuse
            client_max_body_size 1m;

            # CORS headers for the PWA
            add_header 'Access-Control-Allow-Origin' 'https://zsozso.info' always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;

            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://zsozso.info';
                add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type';
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }

            # Write uploaded log to a timestamped file.
            # Uses the lightweight upload helper on port 9977.
            proxy_pass http://127.0.0.1:9977;
        }
    }
}

server {
    if ($host = zsozso.info) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name zsozso.info;
    return 404; # managed by Certbot


}
